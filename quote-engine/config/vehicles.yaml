# ============================================================================
# 수집 대상 차량 마스터 (Phase 1B — 15대)
# 카테고리별로 인기/비인기, 잔가 패턴 분산 고려해서 선정
# ============================================================================

collection_policy:
  contract_terms: [12, 24, 36, 48, 60]
  annual_mileages: [10000, 15000, 20000, 30000, -1]   # -1 = 무제한
  trims_per_vehicle: 2          # 최저 + 상위
  prefer_year_code: "26MY"

  validation_at:
    term: 48
    mileage: 10000
  validation_prepay_pcts: [10, 20, 30]
  validation_deposit_pcts: [10, 20, 30]


vehicles:
  # ─── 인기 가솔린 세단 (4대) ───
  - id: avante
    keyword: 아반떼
    brand: 현대
    category: sedan_popular
    priority: P0
    expected_residual_pct: [60, 70]

  - id: sonata
    keyword: 쏘나타
    brand: 현대
    category: sedan_popular
    priority: P0
    expected_residual_pct: [58, 68]

  - id: grandeur
    keyword: 그랜저
    brand: 현대
    category: sedan_popular
    priority: P0
    expected_residual_pct: [62, 72]

  - id: k5
    keyword: K5
    brand: 기아
    category: sedan_popular
    priority: P1
    expected_residual_pct: [55, 65]
    notes: LPi 렌터카 트림 주의

  # ─── 인기 SUV (4대) ───
