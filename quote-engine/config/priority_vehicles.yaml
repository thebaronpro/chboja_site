# ============================================================================
# 수집 우선순위 차량 리스트 (점진적 빌드업)
# ============================================================================
# 차보자 사이트의 인기 차량 + KB에서 자주 견적 나는 차량 기준
# priority가 낮을수록 먼저 수집 (P0 = 가장 우선)
# 매번 status.py 실행하면 다음 수집 추천 차량을 알려줌
# ============================================================================

# 수집 정책 (1대당 작업량)
policy:
  matrix_terms: [12, 24, 36, 48, 60]
  matrix_mileages: [10000, 15000, 20000, 30000, -1]
  matrix_total: 25                    # 5×5 = 25건 / 트림
  trims_per_vehicle_default: 2        # 최저 + 상위
  validation_per_vehicle: 6           # 선납 3건 + 보증 3건
  total_per_vehicle: 56               # 25×2 + 6 = 56건 / 차량
  expected_time_per_vehicle_min: 20   # 한 대당 약 20분


# ============================================================================
# 우선순위 차량 (Phase별)
# ============================================================================
vehicles:
  # ========== Phase 1A — 가장 인기 차량 10대 (이미 시작) ==========
