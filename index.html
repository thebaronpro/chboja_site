<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280" />
  <title>CHABOZA — 차보자</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; }
    .whitespace-pre-line { white-space: pre-line; }
    @keyframes carDriveIn {
      0%   { transform: translateY(-50%) translateX(260px); opacity: 0; }
      12%  { opacity: 1; }
      68%  { transform: translateY(-50%) translateX(-22px); }
      80%  { transform: translateY(-50%) translateX(9px); }
      90%  { transform: translateY(-50%) translateX(-4px); }
      100% { transform: translateY(-50%) translateX(0); }
    }
    .car-drive-in { animation: carDriveIn 0.9s ease-out forwards; }
  
.mob-bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#fff;border-top:1px solid #e5e5e5;padding-bottom:env(safe-area-inset-bottom);display:block}
.bnav-inner{display:flex;align-items:stretch}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.55rem .25rem .45rem;gap:.18rem;text-decoration:none;color:#a3a3a3;font-size:.65rem;font-weight:600;font-family:inherit}
.bnav-item.active{color:#dc2626}
.bnav-quick{color:#0a0a0a!important}
.bnav-quick-bar{position:absolute;top:0;left:50%;transform:translateX(-50%);width:2rem;height:3px;background:#0a0a0a;border-radius:0 0 3px 3px}
</style>
</head>
<body style="padding-bottom:4rem">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- ★ 데이터·유틸 → data.js 편집 후 여기에 반영 -->
  <script src="data.js"></script>

  <!-- ★ 이하 JSX 파일들은 각 .js 파일을 편집 후 해당 섹션에 붙여넣기
       Live Server 사용 시에는 src 방식으로도 동작합니다 -->
  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useMemo, useRef } = React;

    /* ========== components.js ========== */

    function CarDriveIn({ src, alt, className, style }) {
      const ref = useRef(null);
      const [go, setGo] = useState(false);
      useEffect(() => {
        if (!ref.current) return;
        const obs = new IntersectionObserver(([e]) => {
          if (e.isIntersecting) { setGo(true); obs.disconnect(); }
        }, { threshold: 0.4 });
        obs.observe(ref.current);
        return () => obs.disconnect();
      }, []);
      return <img ref={ref} src={src} alt={alt} className={`${className} ${go ? 'car-drive-in' : 'opacity-0'}`} style={style} />;
    }

    function Icon({ name, size = 18, className = "" }) {
      return <span aria-hidden="true" className={`inline-flex items-center justify-center leading-none ${className}`} style={{ width: size, height: size, fontSize: size }}>{ICONS[name] || "•"}</span>;
    }

    function Placeholder({ dark = false, label, className = "", src }) {
      if (src) return <img src={src} alt="" className={`object-cover ${className}`} />;
      return <div className={`flex items-center justify-center ${dark ? "bg-neutral-700" : "bg-slate-200"} ${className}`}>{label && <span className="text-xs font-bold text-white/80">{label}</span>}</div>;
    }

    function Button({ children, dark = true, className = "", onClick }) {
      return <button onClick={onClick} className={`${dark ? "bg-neutral-900 text-white hover:bg-red-600" : "bg-white text-neutral-900 hover:bg-neutral-100"} inline-flex items-center justify-center gap-2 px-7 py-3 text-sm font-bold transition ${className}`}>{children}</button>;
    }

    function SectionHeader({ eyebrow, title, desc, right, big = false }) {
      return (
        <div className="mb-8 flex items-end justify-between gap-4">
          <div>
            {eyebrow && <p className="mb-2 text-sm font-bold text-neutral-500">{eyebrow}</p>}
            <h2 className={`${big ? "text-6xl" : "text-3xl"} font-black tracking-tight text-neutral-950`}>{title}</h2>
            {desc && <p className="mt-2 text-sm font-semibold text-neutral-400">{desc}</p>}
          </div>
          {right && <div className="text-sm font-bold text-neutral-500">{right}</div>}
        </div>
      );
    }

    function QuickTabs({ tabs }) {
      return <div className="border-b border-neutral-200 bg-white"><div className="mx-auto flex max-w-7xl overflow-x-auto px-4">{tabs.map((tab, idx) => <button key={tab} className={`min-w-fit px-8 py-4 text-sm font-bold whitespace-nowrap ${idx === 0 ? "border-b-4 border-neutral-900 text-neutral-950" : "text-neutral-500"}`}>{tab}</button>)}</div></div>;
    }

    function CarCard({ item, button = "견적 신청하기", tall = false }) {
      return (
        <article className="border border-neutral-200 bg-white">
          <Placeholder src={item.image} className={tall ? "h-72" : "h-48"} />
          <div className="p-5">
            {(item.tag || item.type) && <span className="mb-3 inline-flex bg-neutral-800 px-3 py-1 text-xs font-black text-white">{item.tag || item.type}</span>}
            <h3 className="font-black text-neutral-950">{item.name}</h3>
            <p className="mt-1 font-black text-neutral-950">{item.price}</p>
            <p className="mt-1 text-sm font-semibold text-neutral-500">{item.meta}</p>
            {button && <button className="mt-8 w-full bg-neutral-900 py-3 text-sm font-bold text-white transition hover:bg-red-600">{button}</button>}
          </div>
        </article>
      );
    }

    function ProductCard({ item }) {
      return (
        <article className="border border-neutral-200 bg-white">
          <Placeholder src={item.image} className="h-44" />
          <div className="p-5">
            <h3 className="text-sm font-black text-neutral-950">{item.name}</h3>
            <p className="mt-1 text-xs font-bold text-neutral-700">{item.rating}</p>
            <p className="mt-1 text-sm font-black text-neutral-950">{item.price}</p>
            <button className="mt-7 w-full bg-neutral-900 py-3 text-xs font-bold text-white transition hover:bg-red-600">시공점 예약 · 구매하기</button>
          </div>
        </article>
      );
    }

    function ConsultationBand({ title, desc }) {
      return (
        <section className="bg-neutral-900 py-16 text-white">
          <div className="mx-auto grid max-w-7xl grid-cols-1 gap-12 px-6 md:grid-cols-[1.3fr_.8fr] md:items-center">
            <div>
              <h2 className="mb-3 text-4xl font-black">{title}</h2>
              <p className="font-semibold text-neutral-400">{desc}</p>
              <div className="mt-8 grid gap-4 bg-white p-8 md:grid-cols-2">
                <input className="border border-neutral-200 px-5 py-4 text-sm text-neutral-900" placeholder="성함을 입력해주세요" />
                <input className="border border-neutral-200 px-5 py-4 text-sm text-neutral-900" placeholder="휴대폰 번호를 입력해주세요" />
                <input className="border border-neutral-200 px-5 py-4 text-sm text-neutral-900 md:col-span-2" placeholder="관심 차량을 선택해주세요" />
                <button className="bg-neutral-900 py-4 text-sm font-black text-white md:col-span-2">무료 상담 신청하기</button>
              </div>
            </div>
            <div className="bg-neutral-700 p-10"><p className="mb-5 text-lg font-bold text-white">전화 상담</p><p className="mb-2 text-5xl font-black text-white">1661-3583</p><p className="mb-8 text-sm text-neutral-300">평일 09:00 ~ 18:00 (주말·공휴일 휴무)</p><button className="bg-neutral-400 px-10 py-4 text-sm font-bold text-white"><Icon name="chat" className="mr-2" size={16} />카카오 상담</button></div>
          </div>
        </section>
      );
    }

    function SubCarousel({ banners, setActive }) {
      const [current, setCurrent] = useState(0);
      useEffect(() => {
        const t = window.setInterval(() => setCurrent(i => wrapIndex(i, 1, banners.length)), 4500);
        return () => window.clearInterval(t);
      }, [banners.length]);
      const move = d => setCurrent(i => wrapIndex(i, d, banners.length));
      // active 46%, side 14%, gap 1% — supports ±2 visible
      const getLP = (offset) => {
        if (offset === 0) return 50;
        const s = offset > 0 ? 1 : -1, a = Math.abs(offset);
        return 50 + s * (a === 1 ? (46/2 + 14/2 + 1) : (46/2 + 14/2 + 1) + (a-1)*(14 + 1));
      };
      return (
        <section className="relative overflow-hidden bg-white py-4">
          <div className="relative mx-auto max-w-[1600px] overflow-hidden" style={{ height: 460 }}>
            {banners.map((banner, index) => {
              let offset = index - current;
              if (offset > banners.length / 2) offset -= banners.length;
              if (offset < -banners.length / 2) offset += banners.length;
              const isActive = offset === 0, abs = Math.abs(offset), visible = abs <= 2;
              const lp = getLP(offset);
              const scale = isActive ? 1 : abs === 1 ? 0.85 : 0.72;
              return (
                <button key={banner.title} onClick={() => isActive ? setActive(banner.target) : setCurrent(index)}
                  className={`absolute top-6 h-[400px] overflow-hidden text-left transition-all duration-700 ease-out ${visible ? "opacity-100" : "pointer-events-none opacity-0"}`}
                  style={{ left: `${lp}%`, width: isActive ? "46%" : "14%", transform: `translateX(-50%) scale(${scale})`, zIndex: isActive ? 20 : abs === 1 ? 10 : 5, filter: isActive ? "none" : `saturate(${abs === 1 ? 0.7 : 0.4})` }}
                  aria-label={banner.label}>
                  {banner.image && <img src={banner.image} alt={banner.label} className="absolute inset-0 w-full h-full object-cover" />}
                  <div className="absolute inset-0" style={{ background: isActive ? "linear-gradient(to right, rgba(0,0,0,0.72) 40%, rgba(0,0,0,0.15) 100%)" : "rgba(0,0,0,0.45)" }} />
                  {isActive ? (
                    <div className="relative z-10 px-16 py-12">
                      <span className={`mb-4 inline-flex w-fit px-4 py-1.5 text-sm font-black text-white ${banner.badge}`}>{banner.label}</span>
                      <h1 className="whitespace-pre-line text-4xl font-black leading-tight text-white">{banner.title}</h1>
                      <p className="mt-3 text-sm font-bold text-neutral-300">{banner.desc}</p>
                      <span className="mt-6 inline-flex w-fit items-center gap-2 bg-white text-neutral-900 px-6 py-2.5 text-sm font-black">{banner.button} <Icon name="arrow" size={14} /></span>
                    </div>
                  ) : (
                    <div className="absolute bottom-0 left-0 right-0 z-10 px-4 py-5">
                      <span className={`mb-2 inline-flex w-fit px-2 py-1 text-xs font-black text-white ${banner.badge}`}>{banner.label}</span>
                      <p className="whitespace-pre-line text-xs font-black leading-snug text-white">{banner.title}</p>
                    </div>
                  )}
                </button>
              );
            })}
            <button onClick={() => move(-1)} className="absolute top-1/2 z-30 -translate-y-1/2 p-3 transition opacity-70 hover:opacity-100" style={{ left: `calc(27% + 16px)` }} aria-label="이전">
              <span style={{ display:'inline-block', width:14, height:14, borderLeft:'3px solid #fff', borderBottom:'3px solid #fff', transform:'rotate(45deg) translate(3px,-3px)' }} />
            </button>
            <button onClick={() => move(1)} className="absolute top-1/2 z-30 -translate-y-1/2 p-3 transition opacity-70 hover:opacity-100" style={{ right: `calc(27% + 16px)` }} aria-label="다음">
              <span style={{ display:'inline-block', width:14, height:14, borderRight:'3px solid #fff', borderTop:'3px solid #fff', transform:'rotate(45deg) translate(-3px,3px)' }} />
            </button>
          </div>
          <div className="pb-5 text-center text-xs tracking-[8px] text-neutral-500">
            {banners.map((_, i) => <button key={i} onClick={() => setCurrent(i)} className={i === current ? "text-neutral-900" : "text-neutral-300"}>●</button>)}
          </div>
        </section>
      );
    }

    const PAGE_LINKS = {
      "홈": "index.html",
      "장기렌트": "rental/index.html",
      "할부": "installment/index.html",
      "중고차": "used-car/index.html",
      "화물리스": "lease/index.html",
      "자동차용품": "shop/index.html",
      "이벤트&혜택": "event/index.html",
      "고객센터": "contact/index.html",
    };

    function Header({ active, setActive }) {
      const handleNav = (item) => {
        if (item === "홈") setActive(item);
        else window.location.href = PAGE_LINKS[item];
      };
      return (
        <header className="sticky top-0 z-50 border-t-4 border-neutral-900 bg-white/95 backdrop-blur">
          <div className="mx-auto flex h-11 max-w-7xl items-center justify-center px-4 relative">
            <button onClick={() => setActive("홈")} className="text-3xl font-black tracking-tight text-red-600">CHABOZA</button>
            <div className="absolute right-8 top-4 hidden text-xs text-neutral-500 md:block">로그인&nbsp;&nbsp;|&nbsp;&nbsp;KR&nbsp;&nbsp;|&nbsp;&nbsp;⌕</div>
          </div>
          <nav className="border-y border-neutral-200">
            <div className="mx-auto flex max-w-7xl justify-center overflow-x-auto px-4">
              {NAV_ITEMS.map(item =>
                <button key={item} onClick={() => handleNav(item)}
                  className={`min-w-fit px-8 py-4 text-sm font-semibold transition whitespace-nowrap ${active === item ? "border-b-4 border-neutral-900 text-neutral-950" : "border-b-4 border-transparent text-neutral-500 hover:text-neutral-900"}`}>
                  {item}
                </button>
              )}
            </div>
          </nav>
        </header>
      );
    }

    function Footer({ setActive }) {
      return (
        <footer className="bg-neutral-950 text-neutral-400">
          <div className="mx-auto grid max-w-7xl grid-cols-1 gap-8 px-6 py-10 md:grid-cols-4">
            <div><p className="mb-2 font-bold text-white">차보자</p><p className="text-xs leading-6">서울특별시 금천구 가산동<br />사업자등록번호 000-00-00000<br />대표 임운호</p></div>
            <button onClick={() => setActive("장기렌트")} className="text-left"><p className="mb-2 font-bold text-red-600">회사소개</p><p className="text-xs">신규 입점 문의</p></button>
            <button onClick={() => setActive("고객센터")} className="text-left"><p className="mb-2 font-bold text-red-600">고객센터</p><p className="text-xs">상담신청 및 자주 묻는 질문</p></button>
            <div><p className="mb-2 font-bold text-red-600">대표전화</p><p className="text-xs">1661-3583</p></div>
          </div>
          <div className="mx-auto max-w-7xl border-t border-neutral-800 px-6 py-6 text-xs text-neutral-500">이용약관&nbsp;&nbsp;&nbsp;개인정보처리방침<br />Copyright © 2026 AutoPortal. All Rights Reserved.</div>
        </footer>
      );
    }

    /* ========== pages/home.js ========== */

    function MainCarousel({ setActive }) {
      const [current, setCurrent] = useState(0);
      const [progress, setProgress] = useState(0);
      const DURATION = 4500;
      useEffect(() => {
        setProgress(0);
        let start = null, raf;
        const tick = ts => { if (!start) start = ts; const p = Math.min((ts - start) / DURATION, 1); setProgress(p); if (p < 1) raf = requestAnimationFrame(tick); };
        raf = requestAnimationFrame(tick);
        const timer = window.setInterval(() => { setCurrent(i => wrapIndex(i, 1, MAIN_BANNERS.length)); start = null; }, DURATION);
        return () => { window.clearInterval(timer); cancelAnimationFrame(raf); };
      }, [current]);
      const move = d => setCurrent(i => wrapIndex(i, d, MAIN_BANNERS.length));
      return (
        <section className="relative overflow-hidden bg-white py-4">
          <div className="relative mx-auto max-w-[1600px] overflow-hidden" style={{ height: 460 }}>
            {MAIN_BANNERS.map((banner, index) => {
              let offset = index - current;
              if (offset > MAIN_BANNERS.length / 2) offset -= MAIN_BANNERS.length;
              if (offset < -MAIN_BANNERS.length / 2) offset += MAIN_BANNERS.length;
              const isActive = offset === 0, visible = Math.abs(offset) <= 1;
              const lp = 50 + offset * (70 / 2 + 22 / 2 + 1);
              return (
                <button key={banner.title} onClick={() => isActive ? setActive(banner.target) : setCurrent(index)}
                  className={`absolute top-6 h-[400px] overflow-hidden text-left transition-all duration-700 ease-out ${visible ? "opacity-100" : "pointer-events-none opacity-0"}`}
                  style={{ left: `${lp}%`, width: isActive ? "70%" : "22%", transform: `translateX(-50%) scale(${isActive ? 1 : 0.85})`, zIndex: isActive ? 20 : 10, filter: isActive ? "none" : "saturate(0.7)" }}
                  aria-label={`${banner.label} 배너`}>
                  {isActive ? <>
                    {banner.image && <img src={banner.image} alt={banner.label} className="absolute inset-0 w-full h-full object-cover" />}
                    <div className="absolute inset-0" style={{ background: "linear-gradient(to right, rgba(0,0,0,0.72) 40%, rgba(0,0,0,0.15) 100%)" }} />
                    <div className="relative z-10 px-16 py-12">
                      <span className={`mb-4 inline-flex w-fit px-4 py-1.5 text-sm font-black text-white ${banner.badge}`}>{banner.label}</span>
                      <h1 className="whitespace-pre-line text-4xl font-black leading-tight text-white">{banner.title}</h1>
                      <p className="mt-3 text-sm font-bold text-neutral-300">{banner.desc}</p>
                      <span className="mt-6 inline-flex w-fit items-center gap-2 bg-white text-neutral-900 px-6 py-2.5 text-sm font-black">{banner.button} <Icon name="arrow" size={14} /></span>
                    </div>
                  </> : <>
                    {banner.image && <img src={banner.image} alt="" className="absolute inset-0 w-full h-full object-cover" />}
                    <div className="absolute inset-0" style={{ background: "rgba(0,0,0,0.45)" }} />
                    <div className="absolute bottom-0 left-0 right-0 z-10 px-6 py-6 opacity-90">
                      <span className={`mb-2 inline-flex w-fit px-2 py-1 text-xs font-black text-white ${banner.badge}`}>{banner.label}</span>
                      <p className="whitespace-pre-line text-sm font-black leading-snug text-white">{banner.title}</p>
                    </div>
                  </>}
                </button>
              );
            })}
            <button onClick={() => move(-1)} className="absolute top-1/2 z-30 -translate-y-1/2 p-3 transition opacity-70 hover:opacity-100" style={{ left: `calc(15% + 16px)` }} aria-label="이전 배너">
              <span style={{ display:'inline-block', width:14, height:14, borderLeft:'3px solid #fff', borderBottom:'3px solid #fff', transform:'rotate(45deg) translate(3px,-3px)' }} />
            </button>
            <button onClick={() => move(1)} className="absolute top-1/2 z-30 -translate-y-1/2 p-3 transition opacity-70 hover:opacity-100" style={{ right: `calc(15% + 16px)` }} aria-label="다음 배너">
              <span style={{ display:'inline-block', width:14, height:14, borderRight:'3px solid #fff', borderTop:'3px solid #fff', transform:'rotate(45deg) translate(-3px,3px)' }} />
            </button>
          </div>
          <div className="h-[3px] bg-neutral-200"><div className="h-full bg-neutral-900 transition-none" style={{ width: `${progress * 100}%` }} /></div>
          <div className="py-4 text-center text-xs tracking-[8px] text-neutral-500">
            {MAIN_BANNERS.map((_, i) => <button key={i} onClick={() => setCurrent(i)} className={i === current ? "text-neutral-900" : "text-neutral-300"}>●</button>)}
          </div>
        </section>
      );
    }

    function PopularCars({ setActive }) {
      const [start, setStart] = useState(0);
      const PER = 3;
      const medal = r => r === 1 ? "🥇" : r === 2 ? "🥈" : r === 3 ? "🥉" : null;
      return (
        <section className="mx-auto max-w-7xl px-6 py-16">
          <SectionHeader title={<><span className="font-black">Popular</span><span className="font-light text-neutral-400"> Cars</span></>} desc="이번 달 가장 많이 선택한 차량"
            right={<div className="flex items-center gap-3">
              <span className="text-xs text-neutral-400">{start+1}–{Math.min(start+PER, POPULAR_CARS.length)} / {POPULAR_CARS.length}</span>
              <button onClick={() => setStart(s => Math.max(0, s-1))} disabled={start === 0} className="h-10 w-10 flex items-center justify-center border border-neutral-300 disabled:opacity-30 hover:bg-neutral-900 hover:text-white transition">
                <span style={{ display:'inline-block', width:9, height:9, borderLeft:'2px solid currentColor', borderBottom:'2px solid currentColor', transform:'rotate(45deg) translate(2px,-2px)' }} />
              </button>
              <button onClick={() => setStart(s => Math.min(POPULAR_CARS.length-PER, s+1))} disabled={start >= POPULAR_CARS.length-PER} className="h-10 w-10 flex items-center justify-center border border-neutral-300 disabled:opacity-30 hover:bg-neutral-900 hover:text-white transition">
                <span style={{ display:'inline-block', width:9, height:9, borderRight:'2px solid currentColor', borderTop:'2px solid currentColor', transform:'rotate(45deg) translate(-2px,2px)' }} />
              </button>
            </div>} />
          <div className="grid grid-cols-3 gap-5">
            {POPULAR_CARS.slice(start, start+PER).map(car => (
              <button key={car.rank} onClick={() => setActive("장기렌트")} className="relative h-80 overflow-hidden group text-left">
                <img src={car.image} alt={car.name} className="absolute inset-0 w-full h-full object-cover transition duration-500 group-hover:scale-105" />
                <div className="absolute inset-0" style={{ background: "linear-gradient(to top, rgba(0,0,0,0.82) 40%, rgba(0,0,0,0.1) 100%)" }} />
                <div className="absolute bottom-0 left-0 right-0 p-6 text-white">

    /* ========== App ========== */

    function App() {
      const [active, setActive] = useState("홈");
      return (
        <div className="min-h-screen bg-white font-sans text-neutral-950">
          <Header active={active} setActive={setActive} />
          <main>
            {active === "홈"         && <HomePage        setActive={setActive} />}
            {active === "장기렌트"   && <RentalPage      setActive={setActive} />}
            {active === "할부"       && <InstallmentPage setActive={setActive} />}
            {active === "중고차"     && <UsedCarPage     setActive={setActive} />}
            {active === "화물리스"   && <LeasePage       setActive={setActive} />}
            {active === "자동차용품" && <ShopPage        setActive={setActive} />}
            {active === "이벤트&혜택" && <EventPage />}
            {active === "고객센터"   && <ContactPage />}
          </main>
          <Footer setActive={setActive} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
