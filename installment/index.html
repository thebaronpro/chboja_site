<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=1280"/>
  <title>할부 — CHABOZA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>body { font-family: 'Noto Sans KR', sans-serif; } .whitespace-pre-line { white-space: pre-line; }
.mob-bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#fff;border-top:1px solid #e5e5e5;padding-bottom:env(safe-area-inset-bottom);display:block}
.bnav-inner{display:flex;align-items:stretch}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.55rem .25rem .45rem;gap:.18rem;text-decoration:none;color:#a3a3a3;font-size:.65rem;font-weight:600;font-family:inherit}
.bnav-item.active{color:#dc2626}
.bnav-quick{color:#0a0a0a!important}
.bnav-quick-bar{position:absolute;top:0;left:50%;transform:translateX(-50%);width:2rem;height:3px;background:#0a0a0a;border-radius:0 0 3px 3px}
</style>
</head>
<body style="padding-bottom:4rem">
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
  <script src="../data.js"></script>
  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useRef, useMemo } = React;
    const BASE = "../";
    const NAV = [
      { label:"홈",         href: BASE+"index.html" },
      { label:"장기렌트",   href: BASE+"rental/" },
      { label:"할부",       href: BASE+"installment/" },
      { label:"중고차",     href: BASE+"used-car/" },
      { label:"화물리스",   href: BASE+"lease/" },
      { label:"자동차용품", href: BASE+"shop/" },
      { label:"이벤트&혜택",href: BASE+"event/" },
      { label:"고객센터",   href: BASE+"contact/" },
    ];
    const CURRENT = "할부";

    function Icon({ name, size=18, className="" }) {
      return <span className={`inline-flex items-center justify-center leading-none ${className}`} style={{width:size,height:size,fontSize:size}}>{ICONS[name]||"•"}</span>;
    }
    function Btn({ children, dark=true, className="", onClick }) {
      return <button onClick={onClick} className={`${dark?"bg-neutral-900 text-white hover:bg-red-600":"bg-white text-neutral-900 hover:bg-neutral-100"} inline-flex items-center gap-2 px-7 py-3 text-sm font-bold transition ${className}`}>{children}</button>;
    }
    function Img({ src, className="" }) {
      return src ? <img src={src} alt="" className={`object-cover ${className}`}/> : <div className={`bg-slate-200 ${className}`}/>;
    }
    function SecHeader({ title, desc, right }) {
      return <div className="mb-8 flex items-end justify-between gap-4"><div><h2 className="text-3xl font-black tracking-tight text-neutral-950">{title}</h2>{desc&&<p className="mt-2 text-sm font-semibold text-neutral-400">{desc}</p>}</div>{right&&<div className="text-sm font-bold text-neutral-500">{right}</div>}</div>;
    }
    function CarCard({ item, button="견적 신청하기", tall=false }) {
      return <article className="border border-neutral-200 bg-white"><Img src={item.image} className={`${tall?"h-72":"h-48"} w-full`}/><div className="p-5">{item.tag&&<span className="mb-3 inline-flex bg-neutral-800 px-3 py-1 text-xs font-black text-white">{item.tag}</span>}<h3 className="font-black">{item.name}</h3><p className="mt-1 font-black">{item.price}</p><p className="mt-1 text-sm text-neutral-500">{item.meta}</p>{button&&<button className="mt-8 w-full bg-neutral-900 py-3 text-sm font-bold text-white hover:bg-red-600 transition">{button}</button>}</div></article>;
    }
    function Header() {
            return (
        <header className="sticky top-0 z-50 border-t-4 border-neutral-900 bg-white/95 backdrop-blur">
          <div className="mx-auto flex h-11 max-w-7xl items-center justify-center px-4 relative">
            <a href={BASE+"index.html"} className="text-3xl font-black tracking-tight text-red-600">CHABOZA</a>
            <div className="absolute right-8 top-4 hidden text-xs text-neutral-500 md:block">로그인&nbsp;|&nbsp;KR</div>
          </div>
          <nav className="border-y border-neutral-200">
            <div className="mx-auto flex max-w-7xl justify-center px-4">
              {NAV.map(n=><a key={n.label} href={n.href}} className={`min-w-fit px-8 py-4 text-sm font-semibold transition whitespace-nowrap ${CURRENT===n.label?"border-b-4 border-neutral-900 text-neutral-950":"border-b-4 border-transparent text-neutral-500 hover:text-neutral-900"}`}>{n.label}</a>)}
            </div>
            
          </nav>
        </header>
      );
    }
    function Footer() {
      return (
        <footer className="bg-neutral-950 text-neutral-400">
          <div className="mx-auto grid max-w-7xl grid-cols-1 gap-8 px-6 py-10 md:grid-cols-4">
            <div><p className="mb-2 font-bold text-white">차보자</p><p className="text-xs leading-6">서울특별시 금천구 가산동<br/>사업자등록번호 000-00-00000<br/>대표 임운호</p></div>
            <a href={BASE+"rental/"} className="text-left"><p className="mb-2 font-bold text-red-600">회사소개</p><p className="text-xs">신규 입점 문의</p></a>
            <a href={BASE+"contact/"} className="text-left"><p className="mb-2 font-bold text-red-600">고객센터</p><p className="text-xs">상담신청 및 자주 묻는 질문</p></a>
            <div><p className="mb-2 font-bold text-red-600">대표전화</p><p className="text-xs">1661-3583</p></div>
          </div>
          <div className="mx-auto max-w-7xl border-t border-neutral-800 px-6 py-6 text-xs text-neutral-500">이용약관&nbsp;&nbsp;개인정보처리방침<br/>Copyright © 2026 CHABOZA. All Rights Reserved.</div>
        </footer>
      );
    }

    function SubCarousel({ banners }) {
      const [cur, setCur] = useState(0);
      const [progress, setProgress] = useState(0);
      const DURATION = 4500;
      useEffect(() => {
        setProgress(0);
        let start = null, raf;
        const tick = ts => { if (!start) start = ts; const p = Math.min((ts-start)/DURATION,1); setProgress(p); if(p<1) raf=requestAnimationFrame(tick); };
        raf = requestAnimationFrame(tick);
        const t = setInterval(() => { setCur(i=>(i+1)%banners.length); start=null; }, DURATION);
        return () => { clearInterval(t); cancelAnimationFrame(raf); };
      }, [cur]);
      const move = d => setCur(i=>(i+d+banners.length)%banners.length);
      return (
        <section className="relative overflow-hidden bg-white py-4">
          <div className="relative mx-auto max-w-[1600px] overflow-hidden" style={{height:460}}>
            {banners.map((b,i)=>{
              let off=i-cur; if(off>banners.length/2)off-=banners.length; if(off<-banners.length/2)off+=banners.length;
              const active=off===0, vis=Math.abs(off)<=1;
              const lp=50+off*(70/2+22/2+1);
              return <button key={b.title} onClick={()=>active?window.location.href=BASE+"contact/":setCur(i)} className={`absolute top-6 h-[400px] overflow-hidden text-left transition-all duration-700 ease-out ${vis?"opacity-100":"pointer-events-none opacity-0"}`} style={{left:`${lp}%`,width:active?"70%":"22%",transform:`translateX(-50%) scale(${active?1:0.85})`,zIndex:active?20:10,filter:active?"none":"saturate(0.7)"}} aria-label={b.label}>
                {b.image&&<img src={b.image} alt="" className="absolute inset-0 w-full h-full object-cover"/>}
                <div className="absolute inset-0" style={{background:active?"linear-gradient(to right,rgba(0,0,0,.72) 40%,rgba(0,0,0,.15) 100%)":"rgba(0,0,0,.45)"}}/>
                {active?<div className="relative z-10 px-16 py-12"><span className={`mb-4 inline-flex w-fit px-4 py-1.5 text-sm font-black text-white ${b.badge}`}>{b.label}</span><h1 className="whitespace-pre-line text-4xl font-black leading-tight text-white">{b.title}</h1><p className="mt-3 text-sm font-bold text-neutral-300">{b.desc}</p><a href={BASE+"contact/"} className="mt-6 inline-flex items-center gap-2 bg-white text-neutral-900 px-6 py-2.5 text-sm font-black">{b.button} →</a></div>
                :<div className="absolute bottom-0 left-0 right-0 z-10 px-6 py-6"><span className={`mb-2 inline-flex w-fit px-2 py-1 text-xs font-black text-white ${b.badge}`}>{b.label}</span><p className="whitespace-pre-line text-sm font-black text-white">{b.title}</p></div>}
              </button>;
            })}
            <button onClick={()=>move(-1)} className="absolute top-1/2 z-30 -translate-y-1/2 p-3 opacity-70 hover:opacity-100 transition" style={{left:"calc(15% + 16px)"}}>
              <span style={{display:"inline-block",width:14,height:14,borderLeft:"3px solid #fff",borderBottom:"3px solid #fff",transform:"rotate(45deg) translate(3px,-3px)"}}/>
            </button>
            <button onClick={()=>move(1)} className="absolute top-1/2 z-30 -translate-y-1/2 p-3 opacity-70 hover:opacity-100 transition" style={{right:"calc(15% + 16px)"}}>
              <span style={{display:"inline-block",width:14,height:14,borderRight:"3px solid #fff",borderTop:"3px solid #fff",transform:"rotate(45deg) translate(-3px,3px)"}}/>
            </button>
          </div>
          <div className="h-[3px] bg-neutral-200"><div className="h-full bg-neutral-900 transition-none" style={{width:`${progress*100}%`}} /></div>
          <div className="py-4 text-center text-xs tracking-[8px] text-neutral-500">{banners.map((_,i)=><button key={i} onClick={()=>setCur(i)} className={i===cur?"text-neutral-900":"text-neutral-300"}>●</button>)}</div>
        </section>
      );
    }

    function Page() {
      const tabs = ["신차 할부","중고차 할부","할부 계산기","금리 안내","제휴 금융사"];
      const [activeTab, setActiveTab] = useState(0);
      const [price, setPrice] = useState(3500);
      const [deposit, setDeposit] = useState(500);
      const [rate, setRate] = useState(4.5);
      const [months, setMonths] = useState(48);
      const monthly = useMemo(() => calculateMonthlyPayment(price * 10000, deposit * 10000, rate, months), [price, deposit, rate, months]);

      return <>
        <SubCarousel banners={INSTALLMENT_BANNERS} />

        <div className="border-b border-neutral-200 bg-white">
          <div className="mx-auto flex max-w-7xl overflow-x-auto px-4">
            {tabs.map((t,i)=><button key={t} onClick={()=>setActiveTab(i)} className={`min-w-fit px-8 py-4 text-sm font-bold whitespace-nowrap ${activeTab===i?"border-b-4 border-neutral-900 text-neutral-950":"text-neutral-500 hover:text-neutral-900"}`}>{t}</button>)}
          </div>
        </div>

        <section className="mx-auto max-w-7xl px-6 py-16">
          <SecHeader title="할부 신청 차량" desc="현대·기아 전 차종 무이자·저금리 할부 가능" right="전체 보기 →"/>
          <div className="grid gap-6 md:grid-cols-4">
            {CARS.map(c=><CarCard key={c.name} item={c} button="할부 신청하기"/>)}
          </div>
        </section>

        <section className="bg-neutral-100 py-16">
          <div className="mx-auto max-w-3xl px-6">
            <SecHeader title="할부 계산기" desc="차량 가격과 조건을 입력하면 월 납입금을 계산해드립니다."/>
            <div className="bg-white p-8 shadow-sm">
              <div className="grid gap-6 md:grid-cols-2">
                <div>
                  <label className="mb-2 block text-xs font-black text-neutral-500">차량 가격 (만원)</label>
                  <input type="number" value={price} onChange={e=>setPrice(e.target.value)} className="w-full border border-neutral-200 px-4 py-3 text-sm font-bold focus:outline-none focus:border-neutral-900"/>
                </div>
                <div>
                  <label className="mb-2 block text-xs font-black text-neutral-500">선납금 / 계약금 (만원)</label>
                  <input type="number" value={deposit} onChange={e=>setDeposit(e.target.value)} className="w-full border border-neutral-200 px-4 py-3 text-sm font-bold focus:outline-none focus:border-neutral-900"/>
                </div>
                <div>
                  <label className="mb-2 block text-xs font-black text-neutral-500">연 이자율 (%)</label>
                  <input type="number" step="0.1" value={rate} onChange={e=>setRate(e.target.value)} className="w-full border border-neutral-200 px-4 py-3 text-sm font-bold focus:outline-none focus:border-neutral-900"/>
                </div>
                <div>
                  <label className="mb-2 block text-xs font-black text-neutral-500">할부 기간 (개월)</label>
                  <select value={months} onChange={e=>setMonths(e.target.value)} className="w-full border border-neutral-200 px-4 py-3 text-sm font-bold focus:outline-none focus:border-neutral-900 bg-white">
                    {[12,24,36,48,60,72].map(m=><option key={m} value={m}>{m}개월</option>)}
                  </select>
                </div>
              </div>
              <div className="mt-8 border-t border-neutral-200 pt-8 text-center">
                <p className="text-sm font-bold text-neutral-500">예상 월 납입금</p>
                <p className="mt-2 text-5xl font-black text-neutral-950">{monthly.toLocaleString()}<span className="text-2xl font-bold text-neutral-400">원</span></p>
                <p className="mt-3 text-xs text-neutral-400">※ 실제 금융 조건에 따라 다를 수 있습니다. 정확한 견적은 상담을 통해 확인하세요.</p>
                <button className="mt-6 bg-neutral-900 px-12 py-4 text-sm font-black text-white hover:bg-red-600 transition">할부 상담 신청하기</button>
              </div>
            </div>
          </div>
        </section>

        <section className="bg-neutral-900 py-16 text-white">
          <div className="mx-auto grid max-w-7xl grid-cols-1 gap-12 px-6 md:grid-cols-[1.3fr_.8fr] md:items-center">
            <div>
              <h2 className="mb-3 text-4xl font-black">할부, 아직 고민 중이신가요?</h2>
              <p className="font-semibold text-neutral-400">전문 상담사가 최적 금융 상품을 빠르게 안내해드립니다.</p>
              <div className="mt-8 grid gap-4 bg-white p-8 md:grid-cols-2">
                <input className="border border-neutral-200 px-5 py-4 text-sm text-neutral-900" placeholder="성함"/>
                <input className="border border-neutral-200 px-5 py-4 text-sm text-neutral-900" placeholder="휴대폰 번호"/>
                <input className="border border-neutral-200 px-5 py-4 text-sm text-neutral-900 md:col-span-2" placeholder="관심 차량"/>
                <button className="bg-neutral-900 py-4 text-sm font-black text-white md:col-span-2">무료 상담 신청하기</button>
              </div>
            </div>
            <div className="bg-neutral-700 p-10">
              <p className="mb-5 text-lg font-bold text-white">전화 상담</p>
              <p className="mb-2 text-5xl font-black text-white">1661-3583</p>
              <p className="mb-8 text-sm text-neutral-300">평일 09:00 ~ 18:00</p>
            </div>
          </div>
        </section>
      </>;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(
      <div className="min-h-screen bg-white text-neutral-950"><Header/><main><Page/></main><Footer/></div>
    );
  </script>
<nav class="mob-bottom-nav"><div class="bnav-inner"><a href="../index.html" class="bnav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>홈</span></a><a href="../rental/search.html" class="bnav-item active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><span>차량검색</span></a><a href="../rental/limited.html" class="bnav-item bnav-quick" style="position:relative"><span class="bnav-quick-bar"></span><span style="font-size:1.25rem">⚡</span><span>빠른출고</span></a><a href="#" class="bnav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><span>내 견적</span></a><a href="#" class="bnav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>마이</span></a></div></nav>
</body>
</html>
