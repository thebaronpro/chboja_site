body { font-family: 'Noto Sans KR', -apple-system, sans-serif; }
.mob-bottom-nav{position:fixed!important;bottom:0!important;left:0;right:0;z-index:9999;background:#fff;border-top:1px solid #e5e5e5;padding-bottom:env(safe-area-inset-bottom);display:block!important}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.6rem .25rem .5rem;gap:.2rem;text-decoration:none;color:#a3a3a3;font-size:.65rem;font-weight:600}
.bnav-item.active{color:#dc2626}
.bnav-quick{color:#0a0a0a!important}
.bnav-quick-bar{position:absolute;top:0;left:50%;transform:translateX(-50%);width:2rem;height:3px;background:#0a0a0a;border-radius:0 0 3px 3px}
body{padding-bottom:4rem}
.whitespace-pre-line { white-space: pre-line; }
.td-bottom-btn { display: none; }  /* 데스크탑에서 숨김 */
.limited-trim-info { display: block; }
.popular-arrows { display: flex; }
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;background:none;border:none;position:absolute;right:1rem}
.hamburger span{display:block;width:22px;height:2px;background:#0a0a0a}
@media (max-width: 768px) {
  .popular-arrows { display: none !important; }
  .rental-subnav a { padding: .5rem .85rem !important; font-size: .75rem !important; }
  .hamburger { display: flex !important; }
  .gnb-nav { display: none !important; }
}
@media (max-width: 768px) {
  /* 빠른출고 한정재고: 차 사진 위 가로 배치 */

    grid-template-columns: 1fr !important;
    padding: 1.5rem 1rem !important;
    gap: .5rem !important;
  }
  .limited-section > div:last-child {
    order: -1 !important;
    display: flex !important;
    flex-direction: row !important;
    align-items: center !important;
    gap: .4rem !important;
  }
  .limited-title {
    font-size: 1.42rem !important;
    line-height: 1 !important;
    display: flex !important;
    gap: .5rem !important;
    flex-direction: row !important;
    align-items: center !important;
  }
  .limited-title br { display: none !important; }
  .limited-title span { font-size: 1.42rem !important; }
  .limited-sub { display: none !important; }
  .limited-trim-info { display: none !important; }
  .limited-section > div:last-child > a { display: none !important; }

  /* 타임딜 모바일 */
  .td-inner { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 1rem .5rem !important; padding: 1.25rem 1rem !important; }
  .td-inner > div:nth-child(3) { justify-self: end !important; }
  .td-img { justify-self: start !important; }
  .td-top-row { grid-column: 1/3 !important; }
  .td-inner > div:nth-child(2) { grid-column: 1/3 !important; }
  .td-inner > div:nth-child(3) { grid-column: 1 !important; align-self: center !important; }
  .td-img { grid-column: 2 !important; align-self: center !important; }
  .td-top-row { text-align: center !important; }
  .td-top-row h3 { font-size: 2rem !important; display: flex !important; justify-content: center !important; }
  .td-top-row p { display: none !important; }
  /* 시계: 가로폭 꽉 채워 크게 */
  .td-inner > div:nth-child(2) { justify-content: stretch !important; gap: .5rem !important; width: 100% !important; }
  .td-inner > div:nth-child(2) > div { flex: 1 !important; padding: 1.25rem .5rem !important; text-align: center !important; }
  .td-inner > div:nth-child(2) > div p:first-child { font-size: 2.75rem !important; }
  .td-inner > div:nth-child(2) > div p:last-child { font-size: .9rem !important; }
  .td-bottom-btn { display: flex !important; width: 100% !important; align-items: center; justify-content: center; padding: .75rem; font-size: .875rem; font-weight: 700; background: #dc2626; color: #fff; border: none; cursor: pointer; margin-top: .5rem; }
  .td-orig-btn { display: none !important; }
  /* 차량명+버튼 / 차 이미지: 좌우 나란히 */
  .td-inner > div:nth-child(3) { flex: 1 !important; }
  .td-img {
    display: flex !important; align-items: center !important; justify-content: center !important;
    height: 90px !important; overflow: visible !important; flex: 1 !important;
  }
  .td-img img, .td-img span {
    position: static !important; transform: none !important;
    height: 80px !important; animation: none !important; opacity: 1 !important;
  }
  /* 차량명+이미지 행을 flex row로 */
  .td-car-row { display: flex !important; flex-direction: row !important; align-items: center !important; gap: .5rem !important; }
  .zoom-card { width: 100% !important; min-width: unset !important; }

  /* 한정재고 모바일 리스트형 */
  .limited-grid {
    display: flex !important;
    flex-direction: column !important;
    gap: 0 !important;
    border-top: 1px solid #e5e5e5;
  }
  .limited-grid article {
    display: flex !important;
    flex-direction: row !important;
    align-items: center !important;
    border: none !important;
    border-bottom: 1px solid #f0f0f0 !important;
    border-radius: 0 !important;
    transform: none !important;
    box-shadow: none !important;
    padding: .7rem 1rem !important;
    gap: .5rem !important;
  }
  .limited-grid article .overflow-hidden {
    width: 110px !important;
    height: 75px !important;
    flex-shrink: 0 !important;
    align-self: center !important;
  }
  .limited-grid article .overflow-hidden img {
    width: 100% !important; height: 100% !important;
    transform: none !important; object-fit: contain !important;
  }
  /* info 섹션: 3열 그리드 (이름+가격+메타 / 선납금0% / 대수버튼) */
  .limited-grid article > div.p-4 {
    display: grid !important;
    grid-template-columns: 1fr auto auto !important;
    grid-template-rows: auto auto auto !important;
    align-items: center !important;
    align-content: center !important;
    gap: .1rem 1rem !important;
    padding: 0 0 0 2.5rem !important;
    flex: 1 !important;
  }
  .limited-grid article > div.p-4 > p:nth-child(1) { grid-column:1; grid-row:1; font-size:.85rem !important; font-weight:900 !important; }
  .limited-grid article > div.p-4 > p:nth-child(2) { grid-column:1; grid-row:2; font-size:1.25rem !important; font-weight:900 !important; }
  .limited-grid article > div.p-4 > p:nth-child(3) { grid-column:1; grid-row:3; font-size:.68rem !important; color:#a3a3a3 !important; }
  .limited-grid article > div.p-4 > div {

  .limited-grid article > div.p-4 > div > p:last-child { font-size:.8rem !important; font-weight:400 !important; }

    grid-column:3; grid-row:1/4;
    width:auto !important; margin-top:0 !important;
    padding:.5rem .9rem !important; font-size:.9rem !important;
    align-self:center !important;
  }

@keyframes carDriveIn {
  0%   { transform: translateY(-50%) translateX(260px); opacity: 0; }
  12%  { opacity: 1; }
  68%  { transform: translateY(-50%) translateX(-22px); }
  80%  { transform: translateY(-50%) translateX(9px); }
  90%  { transform: translateY(-50%) translateX(-4px); }
  100% { transform: translateY(-50%) translateX(0); }
}
.car-drive-in { animation: carDriveIn 0.9s ease-out forwards; }

.zoom-card { transition: transform 0.6s cubic-bezier(0.16,1,0.3,1), box-shadow 0.6s cubic-bezier(0.16,1,0.3,1); }
.zoom-card:hover { transform: scale(1.05); z-index: 10; position: relative; box-shadow: 0 8px 32px rgba(0,0,0,.15); }
.zoom-card .zoom-img { transition: transform 0.6s cubic-bezier(0.16,1,0.3,1); transform: scale(1); object-fit: cover; }
.zoom-card:hover .zoom-img { transform: scale(0.82); object-fit: contain; background: #fff; }

@keyframes carRide {
  0%   { transform: translateY(-50%); }
  4%   { transform: translateY(-51.2%); }
  8%   { transform: translateY(-49.2%); }
  12%  { transform: translateY(-51.2%); }
  16%  { transform: translateY(-49.2%); }
  20%  { transform: translateY(-51.2%); }
  24%  { transform: translateY(-49.2%); }
  28%  { transform: translateY(-51%); }
  32%  { transform: translateY(-49.5%); }
  /* 덜컹! */
  36%  { transform: translateY(-56%); }
  40%  { transform: translateY(-43%); }
  43%  { transform: translateY(-52%); }
  46%  { transform: translateY(-49%); }
  /* 달달달 재개 */
  52%  { transform: translateY(-51.2%); }
  56%  { transform: translateY(-49.2%); }
  60%  { transform: translateY(-51.2%); }
  64%  { transform: translateY(-49.2%); }
  68%  { transform: translateY(-51%); }
  72%  { transform: translateY(-49.5%); }
  76%  { transform: translateY(-51%); }
  /* 작은 덜컹 */
  80%  { transform: translateY(-53.5%); }
  83%  { transform: translateY(-47%); }
  86%  { transform: translateY(-50.5%); }
  /* 달달 마무리 */
  90%  { transform: translateY(-51%); }
  94%  { transform: translateY(-49.5%); }
  97%  { transform: translateY(-51%); }
  100% { transform: translateY(-50%); }
}
.car-ride { animation: carRide 3s linear infinite; }
@keyframes chargePulse {
  0%,100% { opacity:.3; transform:scale(1); }
  50%      { opacity:1;  transform:scale(1.15); }
}
@keyframes chargeBar {
  0%   { width:0%; }
  100% { width:100%; }
}
@keyframes evGlow {
  0%,100% { filter: drop-shadow(0 0 0px #4ade80); }
  50%      { filter: drop-shadow(0 0 18px #4ade80); }
}
.ev-banner:hover .ev-car { animation: evGlow 1.2s ease-in-out infinite; }
.ev-banner:hover .ev-bolt { animation: chargePulse .7s ease-in-out infinite; }
.ev-banner:hover .ev-bar  { animation: chargeBar 1.8s ease-out forwards; }

@keyframes streak {
  0%   { transform: translateX(-400%); opacity: 0; }
  8%   { opacity: 1; }
  88%  { opacity: 1; }
  100% { transform: translateX(120%); opacity: 0; }
}

/* UTILS */
function calculateMonthlyPayment(price, deposit, rate, months) {
  const principal = Math.max((Number(price)||0) - (Number(deposit)||0), 0);
  const r = (Number(rate)||0) / 100 / 12;
  const n = Math.max(Number(months)||1, 1);
  return Math.round(r ? principal * r / (1 - Math.pow(1 + r, -n)) : principal / n);
}
function wrapIndex(current, delta, length) {
  if (!length) return 0;
  return ((current + delta) % length + length) % length;
}

function CarDriveIn({ src, alt, className, style }) {
  const ref = useRef(null);
  const [go, setGo] = useState(false);
  const [ride, setRide] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) {
        obs.disconnect();
        setTimeout(() => setGo(true), 500);
        setTimeout(() => setRide(true), 1400);
      }
    }, { threshold: 0.4 });
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return (
    <img ref={ref} src={src} alt={alt}
      className={`${className} ${!go ? 'opacity-0' : ride ? 'car-ride' : 'car-drive-in'}`}
      style={style} />

function EVBanner() {
  const [popup, setPopup] = useState(false);
  const [hovering, setHovering] = useState(false);
  const [dots, setDots] = useState('.');
  const timer = useRef(null);
  const dotsTimer = useRef(null);
  const DOTS_SEQ = ['.', '..', '...', '.', '..', '...'];

  useEffect(() => {
    if (hovering) {
      let i = 0;
      dotsTimer.current = setInterval(() => {
        i = (i + 1) % DOTS_SEQ.length;
        setDots(DOTS_SEQ[i]);
      }, 180);
    } else {
      clearInterval(dotsTimer.current);
      setDots('.');
    }
    return () => clearInterval(dotsTimer.current);
  }, [hovering]);
  const bannerRef = useRef(null);
  const isMobile = typeof window !== 'undefined' && window.matchMedia('(hover: none)').matches;

  useEffect(() => {
    if (!isMobile || !bannerRef.current) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) {
        timer.current = setTimeout(() => setPopup(true), 1800);
      } else {
        clearTimeout(timer.current);
      }
    }, { threshold: 0.6 });
    obs.observe(bannerRef.current);
    return () => { obs.disconnect(); clearTimeout(timer.current); };
  }, []);

  const onEnter = () => {
    if (isMobile) return;
    setHovering(true);
    timer.current = setTimeout(() => setPopup(true), 1800);
  };
  const onLeave = () => {
    if (isMobile) return;
    setHovering(false);
    clearTimeout(timer.current);
  };

  return (
    <>
    {popup && (
      <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,.5)', zIndex:9999, display:'flex', alignItems:'center', justifyContent:'center' }}

    <div className="ev-banner mx-auto max-w-7xl px-6 py-4 cursor-pointer"

      onClick={() => { clearTimeout(timer.current); window.location.href='ev.html'; }}>

function SubCarousel({ banners, setActive }) {
  const [current, setCurrent] = useState(0);
  const [progress, setProgress] = useState(0);
  const [paused, setPaused] = useState(false);
  const [isMob, setIsMob] = useState(typeof window !== 'undefined' && window.innerWidth <= 768);
  const touchX = useRef(null);
  const prevCurrentRef = useRef(0);
  const DURATION = 4000;
  useEffect(() => {
    const onResize = () => setIsMob(window.innerWidth <= 768);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);
  useEffect(() => {
    if (paused) return;
    if (!isMob) {
      setProgress(0);
      let start = null, raf;
      const tick = ts => {
        if (!start) start = ts;
        const p = Math.min((ts - start) / DURATION, 1);
        setProgress(p);
        if (p < 1) raf = requestAnimationFrame(tick);
      };
      raf = requestAnimationFrame(tick);
      const t = window.setInterval(() => { setCurrent(i => wrapIndex(i, 1, banners.length)); start = null; }, DURATION);
      return () => { window.clearInterval(t); cancelAnimationFrame(raf); };
    } else {
      const t = window.setInterval(() => {
        prevCurrentRef.current = current;
        setCurrent(i => wrapIndex(i, 1, banners.length));
      }, DURATION);
      return () => window.clearInterval(t);
    }
  }, [current, isMob, paused]);
  const move = d => { prevCurrentRef.current = current; setCurrent(i => wrapIndex(i, d, banners.length)); };
  const onTouchStart = e => { touchX.current = e.touches[0].clientX; };
  const onTouchEnd = e => {
    if (touchX.current === null) return;
    const diff = touchX.current - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) move(diff > 0 ? 1 : -1);
    touchX.current = null;
  };
  const containerH = isMob ? 340 : 500;
  const aw = 72, sw = 13;
  const cur = banners[current];
  return (
    <>
      <section className="relative bg-white" onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
        <div className="relative mx-auto overflow-hidden" style={{ height: containerH }}>
          {banners.map((banner, index) => {
            let offset = index - current;
            if (offset > banners.length / 2) offset -= banners.length;
            if (offset < -banners.length / 2) offset += banners.length;
            const isActive = offset === 0;
            const visible = Math.abs(offset) <= 1;
            let prevOffset = index - prevCurrentRef.current;
            if (prevOffset > banners.length / 2) prevOffset -= banners.length;
            if (prevOffset < -banners.length / 2) prevOffset += banners.length;
            const isJumping = isMob && Math.abs(offset - prevOffset) > 1;

            // 데스크탑: peek 포지셔닝 / 모바일: 풀위드
            const lp = 50 + offset * (aw / 2 + sw / 2 + 1);

function useCountdown() {
  const getRemaining = () => {
    const now = new Date();
    const end = new Date();
    end.setHours(23, 59, 59, 999);
    const diff = Math.max(0, end - now);
    return {
      h: String(Math.floor(diff / 3600000)).padStart(2, '0'),
      m: String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0'),
      s: String(Math.floor((diff % 60000) / 1000)).padStart(2, '0'),
    };
  };
  const [time, setTime] = useState(getRemaining);
  useEffect(() => {
    const t = setInterval(() => setTime(getRemaining()), 1000);
    return () => clearInterval(t);
  }, []);
  return time;
}

                className={`min-w-fit px-6 py-3 whitespace-nowrap transition font-semibold ${isQuick ? (isActive ? "text-sm font-black text-red-600 border-b-2 border-red-400" : "text-sm font-black text-red-600 border-b-2 border-transparent hover:text-red-700") : isActive ? "text-sm text-neutral-900 font-black border-b-2 border-neutral-400" : "text-sm text-neutral-500 border-b-2 border-transparent hover:text-neutral-900"}`}>
                {isQuick ? <>⚡ {t}</> : t}
              </a>
            );
          })}
        </div>
      </div>
      <div className="bg-neutral-100 border-b border-neutral-200 cursor-pointer" onClick={() => window.location.href='search.html'}>
        <div className="mx-auto flex max-w-7xl items-center gap-3 px-6 py-3">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#737373" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <span className="text-sm text-neutral-400">차량명을 입력해주세요</span>
        </div>
      </div>
    </>
  );
}


const navFn = (p) => { window.location.href = { "홈":"../index.html", "장기렌트":"index.html", "할부":"../installment/", "중고차":"../used-car/", "화물리스":"../lease/", "자동차용품":"../shop/", "이벤트&혜택":"../event/", "고객센터":"../contact/" }[p] || "#"; };

function AppRoot() {

          <div style={{padding:'1.5rem 1.5rem 3rem'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingBottom:'1.5rem',borderBottom:'1px solid #f0f0f0',marginBottom:'1rem'}}>
              <span style={{fontSize:'1.5rem',fontWeight:900,color:'#dc2626',letterSpacing:'-.03em'}}>CHABOZA</span>
              <button onClick={() => setMobOpen(false)} style={{fontSize:'2rem',background:'none',border:'none',cursor:'pointer',color:'#0a0a0a',lineHeight:1,padding:'0 .25rem'}}>×</button>
            </div>
            {NAV_ITEMS.map(item => (
              <button key={item} onClick={() => { navFn(item); setMobOpen(false); }}
                style={{display:'block',width:'100%',padding:'1rem 0',fontSize:'1rem',fontWeight:item==='장기렌트'?900:600,color:item==='장기렌트'?'#0a0a0a':'#525252',borderBottom:'1px solid #f5f5f5',background:'none',textAlign:'left',cursor:'pointer',fontFamily:'inherit'}}>
                {item}
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AppRoot />);
