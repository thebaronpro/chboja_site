<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>CHABOZA · 모바일</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Archivo+Black&display=swap" rel="stylesheet" />

<style>
  :root {
    --brand: #E11D2E;
    --brand-2: #C2151F;
    --brand-soft: #FFE9EB;
    --ink: #0A0A0B;
    --ink-2: #18181B;
    --ink-3: #2A2A2E;
    --slate: #52525B;
    --mute: #8A8A93;
    --line: #E7E7EA;
    --line-2: #F2F2F4;
    --bg: #FFFFFF;
    --surface: #F7F7F8;
    --ev: #2ECC8A;
    --ev-2: #0F7A53;
    --ev-bg: #0C2A20;
    --ev-bg-2: #06120E;
    --warn: #F59E0B;
    --radius-sm: 8px;
    --radius: 14px;
    --radius-lg: 22px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: #EFEFF2;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; padding: 0; color: inherit; }
  a { color: inherit; text-decoration: none; }

  /* Page chrome — phone in viewport */
  .stage {
    min-height: 100vh;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 32px 12px;
    background: radial-gradient(1200px 600px at 50% -10%, #FFFFFF 0%, #EFEFF2 60%);
  }
  .device-mount { transform-origin: top center; }

  /* The app screen inside the iOS device */
  .app {
    height: 100%;
    background: #FFFFFF;
    overflow-y: auto;
    overflow-x: hidden;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }
  .app::-webkit-scrollbar { width: 0; }

  /* Sticky header */
  .topbar {
    position: sticky; top: 0; z-index: 30;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(14px) saturate(160%);
    -webkit-backdrop-filter: blur(14px) saturate(160%);
    border-bottom: 1px solid var(--line-2);
  }
  .topbar-inner {
    height: 52px; display: grid; grid-template-columns: 40px 1fr 40px;
    align-items: center; padding: 0 12px;
  }
  .iconbtn {
    width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
    border-radius: 12px; color: var(--ink);
    transition: background .15s;
  }
  .iconbtn:hover { background: var(--surface); }
  .brand {
    font-family: 'Archivo Black', 'Pretendard', sans-serif;
    color: var(--brand);
    font-size: 22px;
    letter-spacing: 0.5px;
    text-align: center;
    transform: skewX(-4deg);
  }

  /* Tabs */
  .tabs {
    display: flex; gap: 18px; overflow-x: auto; padding: 0 18px;
    border-bottom: 1px solid var(--line-2);
    background: #fff;
    position: sticky; top: 52px; z-index: 29;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    position: relative; padding: 12px 2px 14px; font-size: 14px; font-weight: 500;
    color: var(--mute); white-space: nowrap; flex-shrink: 0;
  }
  .tab.active { color: var(--ink); font-weight: 700; }
  .tab.active::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: -1px;
    height: 2.5px; background: var(--ink); border-radius: 2px;
  }
  .tab .bolt { display: inline-block; vertical-align: -2px; margin-right: 3px; color: var(--brand); }

  /* Search */
  .search {
    margin: 12px 16px; padding: 12px 14px;
    background: var(--surface); border-radius: 12px;
    display: flex; align-items: center; gap: 10px;
    color: var(--mute); font-size: 14px;
  }

  /* Sections */
  section { padding: 8px 0; }
  .section-head {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 22px 18px 14px;
  }
  .section-title { font-size: 22px; font-weight: 800; letter-spacing: -0.4px; }
  .section-title .accent { color: var(--brand); }
  .section-sub { font-size: 12px; color: var(--mute); margin-top: 4px; }
  .section-more { font-size: 13px; color: var(--slate); font-weight: 500; display: flex; align-items: center; gap: 2px; }

  /* Util */
  .row { display: flex; }
  .pill {
    display: inline-flex; align-items: center;
    padding: 6px 12px; border-radius: 999px;
    font-size: 12.5px; font-weight: 600;
    background: var(--surface); color: var(--ink-2);
    border: 1px solid transparent;
    white-space: nowrap; flex-shrink: 0;
    transition: all .15s;
  }
  .pill.dark { background: var(--ink); color: #fff; }
  .pill.outline { background: #fff; border-color: var(--line); }

  /* Hero */
  .hero { padding: 4px 16px 0; }
  .hero-card {
    position: relative; height: 420px; border-radius: 20px; overflow: hidden;
    background: #1a1a1a;
    box-shadow: 0 12px 28px -10px rgba(0,0,0,0.25);
  }
  .hero-slide {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    transition: opacity .55s ease;
  }
  .hero-slide::after {
    content:''; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.0) 30%, rgba(0,0,0,0.85) 100%);
  }
  .hero-content {
    position: absolute; left: 22px; right: 22px; bottom: 70px; color: #fff;
    z-index: 2;
  }
  .hero-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 11px; border-radius: 999px;
    background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    font-size: 11.5px; font-weight: 600; letter-spacing: 0.3px;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .hero-title {
    margin-top: 14px; font-size: 28px; line-height: 1.18; font-weight: 800; letter-spacing: -0.6px;
  }
  .hero-title strong { color: #FF6B7A; }
  .hero-meta {
    margin-top: 12px; display: flex; gap: 14px; font-size: 12px; opacity: 0.85;
  }
  .hero-meta span { display: flex; align-items: center; gap: 4px; }
  .hero-meta .dot { width: 3px; height: 3px; background: rgba(255,255,255,0.5); border-radius: 50%; }
  .hero-progress {
    position: absolute; bottom: 24px; left: 22px; right: 22px;
    display: flex; align-items: center; gap: 6px; z-index: 3;
  }
  .hp-bar {
    height: 3px; flex: 1; background: rgba(255,255,255,0.25); border-radius: 2px; overflow: hidden;
  }
  .hp-bar > i {
    display: block; height: 100%; width: 0; background: #fff; border-radius: 2px;
    transition: width .1s linear;
  }
  .hp-bar.done > i { width: 100%; }
  .hp-bar.idle > i { width: 0; }
  .hp-bar.active > i { width: var(--p, 0%); }
  .hp-counter { font-size: 11px; color: rgba(255,255,255,0.85); font-variant-numeric: tabular-nums; padding-left: 4px; }

  /* Benefits row directly below hero */
  .benefits {
    margin: 14px 16px 0; padding: 14px 16px;
    background: linear-gradient(135deg, #FFF6F7 0%, #FFF 100%);
    border: 1px solid var(--line-2);
    border-radius: 14px;
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  }
  .benefit { display: flex; flex-direction: column; gap: 6px; align-items: flex-start; }
  .benefit-ic { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; color: var(--brand); }
  .benefit-lbl { font-size: 11.5px; color: var(--mute); font-weight: 500; }
  .benefit-val { font-size: 13px; font-weight: 700; color: var(--ink); letter-spacing: -0.2px; }

  /* Quick-actions tile */
  .quick { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 22px 16px 6px; }
  .quick-tile {
    aspect-ratio: 1/1.05; border-radius: 14px;
    background: var(--surface); border: 1px solid transparent;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    transition: all .15s;
  }
  .quick-tile:active { transform: scale(0.97); }
  .quick-tile.brand { background: linear-gradient(140deg, #FFE9EB 0%, #FFD2D6 100%); }
  .quick-tile.ev { background: linear-gradient(140deg, #E0F7EC 0%, #B6EBD0 100%); }
  .quick-ic { font-size: 22px; }
  .quick-lbl { font-size: 11.5px; font-weight: 600; color: var(--ink-2); }

  /* Fast delivery (빠른출고) section */
  .chips-row {
    display: flex; gap: 8px; overflow-x: auto; padding: 4px 18px 14px;
  }
  .chips-row::-webkit-scrollbar { display: none; }
  .fd-list { padding: 0 16px; display: flex; flex-direction: column; gap: 12px; }
  .fd-card {
    position: relative; background: #fff; border: 1px solid var(--line-2);
    border-radius: 16px; overflow: hidden;
    transition: all .2s;
  }
  .fd-card:active { transform: scale(0.99); }
  .fd-card-inner { display: grid; grid-template-columns: 142px 1fr; gap: 12px; padding: 14px; align-items: center; }
  .fd-img {
    height: 92px; border-radius: 10px;
    background: linear-gradient(180deg, #FAFAFB 0%, #F0F0F2 100%);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .fd-info { min-width: 0; }
  .fd-trim { font-size: 11px; color: var(--mute); font-weight: 500; margin-bottom: 3px; }
  .fd-name { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
  .fd-price { margin-top: 6px; font-size: 17px; font-weight: 800; letter-spacing: -0.4px; }
  .fd-price small { font-size: 11px; color: var(--mute); font-weight: 500; margin-left: 2px; }
  .fd-pricesub { font-size: 11px; color: var(--mute); margin-top: 2px; }
  .fd-stock {
    position: absolute; top: 12px; right: 12px;
    background: var(--ink); color: #fff; padding: 4px 9px;
    border-radius: 6px; font-size: 11px; font-weight: 700;
    letter-spacing: -0.2px;
  }
  .fd-stock.low { background: var(--brand); }
  .fd-stock.hot::before { content: '🔥'; margin-right: 3px; }

  .fd-more {
    margin: 14px 16px 0;
    height: 50px;
    border: 1px solid var(--line);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    font-size: 14px; font-weight: 600; color: var(--ink-2);
  }

  /* Time deal */
  .timedeal-wrap { margin: 28px 0 0; padding: 0 16px; }
  .timedeal {
    position: relative;
    background: linear-gradient(180deg, #131316 0%, #08080A 100%);
    border-radius: 20px; padding: 24px 20px 22px;
    overflow: hidden;
    color: #fff;
    isolation: isolate;
  }
  .td-head {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin-bottom: 4px;
  }
  .td-head-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15) 50%, transparent); max-width: 60px; }
  .td-title {
    font-size: 26px; font-weight: 900; letter-spacing: -0.5px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .td-bolt { color: var(--brand); font-size: 24px; }
  .td-sub { text-align: center; font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 18px; }

  .td-counter { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 18px; }
  .td-cell {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 14px 0;
    text-align: center;
  }
  .td-num {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 32px; font-weight: 700; letter-spacing: -1px;
    color: #fff; line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .td-lbl { font-size: 10.5px; color: rgba(255,255,255,0.55); margin-top: 6px; letter-spacing: 0.5px; }

  /* Car + streaks scene */
  .td-scene {
    position: relative; height: 120px; margin: 6px -20px 14px;
    overflow: hidden;
  }
  .td-floor {
    position: absolute; left: 0; right: 0; bottom: 14px; height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.18) 30%, rgba(255,255,255,0.18) 70%, transparent 100%);
  }
  .td-streak {
    position: absolute;
    height: 1.2px; width: 90px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.9), transparent);
    border-radius: 2px;
    animation: streak 1.6s linear infinite;
    filter: blur(0.3px);
  }
  .td-streak.s1 { top: 28%; animation-duration: 1.4s; opacity: 0.7; }
  .td-streak.s2 { top: 44%; animation-duration: 1.7s; animation-delay: -0.3s; opacity: 0.85; width: 130px; }
  .td-streak.s3 { top: 60%; animation-duration: 1.2s; animation-delay: -0.7s; opacity: 0.55; width: 60px; }
  .td-streak.s4 { top: 76%; animation-duration: 1.9s; animation-delay: -1.1s; opacity: 0.5; width: 110px; }
  .td-streak.s5 { top: 36%; animation-duration: 2.2s; animation-delay: -0.5s; opacity: 0.35; width: 180px; filter: blur(1px); }
  @keyframes streak {
    0% { transform: translateX(-200px); }
    100% { transform: translateX(calc(390px + 200px)); }
  }
  .td-glow {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -38%);
    width: 240px; height: 80px; border-radius: 50%;
    background: radial-gradient(closest-side, rgba(225,29,46,0.25), transparent);
    filter: blur(20px);
    z-index: 0;
  }
  .td-car {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: 240px; z-index: 1;
  }

  .td-info {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    margin-bottom: 14px;
  }
  .td-info-name { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
  .td-info-price { font-size: 12.5px; color: rgba(255,255,255,0.65); margin-top: 3px; }
  .td-info-price b { color: #fff; font-weight: 700; }
  .td-info-tag {
    background: var(--brand); color: #fff; padding: 5px 9px; border-radius: 6px;
    font-size: 11px; font-weight: 700;
  }
  .td-cta {
    height: 50px; width: 100%; border-radius: 12px;
    background: var(--brand);
    color: #fff; font-size: 15px; font-weight: 700; letter-spacing: -0.3px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    box-shadow: 0 6px 18px -6px rgba(225,29,46,0.65);
    position: relative; overflow: hidden;
  }
  .td-cta::after {
    content: ''; position: absolute; top: 0; bottom: 0; width: 50%; left: -60%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
    animation: shine 2.6s ease-in-out infinite;
  }
  @keyframes shine {
    0% { left: -60%; }
    60%, 100% { left: 110%; }
  }

  /* Popular vehicles horizontal scroll */
  .pop-scroll {
    display: flex; gap: 12px; overflow-x: auto; padding: 4px 16px 16px;
    scroll-snap-type: x mandatory;
  }
  .pop-scroll::-webkit-scrollbar { display: none; }
  .pop-card {
    flex-shrink: 0; width: 220px;
    background: #fff; border: 1px solid var(--line-2); border-radius: 16px;
    overflow: hidden; scroll-snap-align: start;
    position: relative;
    transition: all .2s;
  }
  .pop-card:active { transform: translateY(2px); }
  .pop-rank {
    position: absolute; top: 16px; right: 18px;
    font-family: 'Archivo Black', sans-serif;
    font-size: 96px; line-height: 0.8;
    color: var(--brand); opacity: 0.18;
    pointer-events: none;
  }
  .pop-img {
    height: 130px; background: linear-gradient(180deg, #FAFAFB 0%, #F0F0F2 100%);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .pop-body { padding: 14px 16px 16px; }
  .pop-name { font-size: 14px; font-weight: 700; }
  .pop-price { margin-top: 6px; font-size: 15px; font-weight: 800; letter-spacing: -0.3px; }
  .pop-price small { font-size: 11px; color: var(--mute); font-weight: 500; }
  .pop-tags { margin-top: 8px; display: flex; gap: 4px; flex-wrap: wrap; }
  .pop-tags .tag { font-size: 10px; color: var(--slate); padding: 2px 6px; background: var(--surface); border-radius: 4px; font-weight: 500; }

  /* EV special card */
  .ev-card {
    margin: 18px 16px 0;
    background: linear-gradient(135deg, var(--ev-bg) 0%, var(--ev-bg-2) 100%);
    border-radius: 18px;
    padding: 22px 20px 20px;
    position: relative;
    overflow: hidden;
    color: #fff;
    isolation: isolate;
  }
  .ev-card::before {
    content: ''; position: absolute; right: -40px; top: -40px; width: 200px; height: 200px;
    background: radial-gradient(closest-side, rgba(46,204,138,0.22), transparent);
    z-index: 0;
  }
  .ev-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; position: relative; z-index: 1; }
  .ev-tag {
    padding: 5px 10px; border-radius: 999px;
    background: rgba(46,204,138,0.18); color: var(--ev);
    font-size: 11px; font-weight: 700; letter-spacing: 0.2px;
  }
  .ev-title { font-size: 28px; font-weight: 900; letter-spacing: -0.6px; position: relative; z-index: 1; }
  .ev-sub { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 6px; position: relative; z-index: 1; }
  .ev-meter { margin: 16px 0 12px; position: relative; z-index: 1; }
  .ev-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
  .ev-bar > i {
    display: block; height: 100%; width: 0;
    background: linear-gradient(90deg, #2ECC8A, #6CF7B6);
    border-radius: 3px;
    box-shadow: 0 0 8px rgba(46,204,138,0.6);
    transition: width 1.2s ease-out;
  }
  .ev-bar.active > i { width: 78%; }
  .ev-charge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px; color: var(--ev); margin-top: 6px;
    display: flex; justify-content: space-between;
  }
  .ev-car-img {
    position: absolute; right: -10px; bottom: 12px; width: 170px; z-index: 1;
    filter: drop-shadow(0 8px 14px rgba(0,0,0,0.4));
  }
  .ev-cta {
    margin-top: 6px;
    height: 44px; width: 100%; border-radius: 10px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(46,204,138,0.4);
    color: #fff; font-size: 13.5px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    position: relative; z-index: 1;
  }

  /* Weekly Korean cars */
  .wk-grid { padding: 0 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .wk-card {
    background: #fff; border: 1px solid var(--line-2); border-radius: 14px;
    padding: 12px; display: flex; flex-direction: column;
  }
  .wk-img {
    height: 92px; background: linear-gradient(180deg, #FAFAFB 0%, #F0F0F2 100%);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 10px; position: relative;
  }
  .wk-badge {
    position: absolute; top: 8px; left: 8px;
    background: var(--ink); color: #fff;
    font-size: 10px; font-weight: 700;
    padding: 3px 7px; border-radius: 4px;
  }
  .wk-badge.hot { background: var(--brand); }
  .wk-badge.ev { background: var(--ev-2); }
  .wk-name { font-size: 13.5px; font-weight: 700; letter-spacing: -0.2px; }
  .wk-price { font-size: 15px; font-weight: 800; margin-top: 4px; letter-spacing: -0.3px; }
  .wk-meta { font-size: 11px; color: var(--mute); margin-top: 3px; }
  .wk-cta {
    margin-top: 10px; height: 36px; border-radius: 8px;
    background: var(--ink); color: #fff; font-size: 12.5px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
  }

  /* Consultation form */
  .cs-section {
    margin: 28px 0 0; padding: 32px 22px 36px;
    background: linear-gradient(180deg, #0E0E12 0%, #1A1A1F 100%);
    color: #fff;
  }
  .cs-eyebrow {
    display: inline-block; padding: 5px 10px; border-radius: 999px;
    background: rgba(225,29,46,0.15); color: #FF8B95;
    font-size: 11px; font-weight: 700; letter-spacing: 0.4px;
    margin-bottom: 12px;
  }
  .cs-title { font-size: 26px; font-weight: 800; letter-spacing: -0.6px; line-height: 1.2; }
  .cs-title b { color: #FF6B7A; }
  .cs-sub { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 10px; line-height: 1.5; }
  .cs-meta { display: flex; gap: 12px; margin-top: 14px; font-size: 12px; color: rgba(255,255,255,0.7); }
  .cs-meta span { display: inline-flex; align-items: center; gap: 6px; }
  .cs-meta .dot { width: 4px; height: 4px; background: var(--ev); border-radius: 50%; box-shadow: 0 0 6px var(--ev); }

  .cs-form {
    margin-top: 22px;
    background: #fff; border-radius: 18px; padding: 18px;
    color: var(--ink);
  }
  .cs-field {
    height: 50px; border-radius: 10px; background: var(--surface);
    display: flex; align-items: center; padding: 0 16px;
    margin-bottom: 8px;
    font-size: 14px;
    border: 1px solid transparent;
    transition: all .15s;
  }
  .cs-field.has { color: var(--ink); font-weight: 500; }
  .cs-field:not(.has) { color: var(--mute); }
  .cs-field.focus { border-color: var(--ink); background: #fff; }
  .cs-field.select { justify-content: space-between; }
  .cs-agree {
    margin: 12px 4px 14px; display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--slate);
  }
  .cs-agree .cb {
    width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid var(--line);
    display: flex; align-items: center; justify-content: center;
  }
  .cs-agree .cb.on { background: var(--ink); border-color: var(--ink); color: #fff; }
  .cs-submit {
    height: 52px; width: 100%; border-radius: 12px;
    background: var(--ink); color: #fff;
    font-size: 15px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }

  .cs-aux {
    margin-top: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .cs-aux-card {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 14px;
  }
  .cs-aux-title { font-size: 13px; font-weight: 700; color: #fff; }
  .cs-aux-desc { font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 4px; line-height: 1.4; }
  .cs-aux-link { font-size: 12px; color: var(--ev); margin-top: 10px; display: flex; align-items: center; gap: 4px; font-weight: 600; }

  /* Footer */
  footer {
    padding: 24px 22px 88px;
    background: #08080A;
    color: rgba(255,255,255,0.4);
    font-size: 11.5px; line-height: 1.6;
  }
  footer .f-brand {
    font-family: 'Archivo Black', sans-serif;
    color: rgba(255,255,255,0.55);
    font-size: 18px; margin-bottom: 10px;
    transform: skewX(-4deg);
    display: inline-block;
  }
  footer .f-row { display: flex; gap: 12px; margin-bottom: 14px; }
  footer .f-row a { color: rgba(255,255,255,0.7); font-weight: 500; font-size: 12px; }

  /* SVG car illustration helpers */
  .car-illust { width: 100%; height: 100%; }

  /* Tab bar (bottom) */
  .tabbar {
    position: absolute; left: 0; right: 0; bottom: 0; height: 72px;
    background: rgba(255,255,255,0.94);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-top: 1px solid var(--line-2);
    display: grid; grid-template-columns: repeat(5, 1fr);
    padding: 6px 4px 18px;
    z-index: 40;
  }
  .tb {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; font-size: 10px; color: var(--mute); font-weight: 500;
    border-radius: 10px; padding: 4px 0;
  }
  .tb.active { color: var(--ink); }
  .tb.active .tb-ic { color: var(--brand); }
  .tb-ic { width: 22px; height: 22px; }
</style>
